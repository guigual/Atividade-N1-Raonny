<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTech | Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">EcoTech Solutions</div>
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="menu-icon">&#9776;</label>
            <ul class="nav-links">
                <li><a href="index.html">Início</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1 style="text-align: center; margin-bottom: 2rem;">Fale Connosco</h1>
            
            <!-- Formulário estruturado com Flexbox -->
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite o seu nome">
                </div>
                
                <div class="form-group">
                    <label for="email">E-mail Profissional:</label>
                    <input type="email" id="email" name="email" required placeholder="exemplo@empresa.com">
                </div>

                <div class="form-group">
                    <label for="mensagem">Como podemos ajudar a sua empresa?</label>
                    <textarea id="mensagem" name="mensagem" rows="5" required placeholder="Escreva a sua mensagem..."></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 EcoTech Solutions. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
